<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev@archlinux</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #303446;
  --surface: #414559;
  --overlay: #626880;
  --fg: #c6d0f5;
  --muted: #b5bfe2;
  --blue: #8caaee;
  --pink: #f2d5cf;
  --red: #ea999c;
  --green: #a6d189;
  --mauve: #ca9ee6;
  --yellow: #e5c890;
  --peach: #ef9f76;
  --border: #babbf1;
  --accent: #684eff;
}
* { margin:0; padding:0; box-sizing:border-box; background:transparent; font-family:'IBM Plex Mono',monospace; font-weight:500; }
html, body {
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  font-size: 1rem;
}
body {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 1.5rem;
}
.window {
  width: 100%;
  max-width: 90ch;
  display: flex;
  flex-direction: column;
}
.titlebar {
  background: var(--surface);
  border-radius: 8px 8px 0 0;
  padding: .5rem .75rem;
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-shrink: 0;
}
.dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.dot.r { background:#ea999c; }
.dot.y { background:#e5c890; }
.dot.g { background:#a6d189; }
.win-title { margin-left:.5rem; color:var(--overlay); font-size:.82rem; user-select:none; }
.terminal-body {
  background: var(--bg);
  border: 1px solid var(--surface);
  border-top: none;
  border-radius: 0 0 8px 8px;
  padding: 1.25rem 1.25rem .75rem;
  min-height: 70vh;
  cursor: text;
}
.line { line-height: 1.65; word-break: break-word; }
.line.mt { margin-top: .8rem; }
.line a { color: var(--pink); text-decoration: none; }
.line a:hover { text-decoration: underline; }
a.github:hover { color: var(--green); }
a.twitter:hover { color: #1a8cd8; }
a.youtube:hover { color: #ff4444; }
a.twitch:hover { color: #772ce8; }
a.bluesky:hover { color: #208bfe; }
.pu { color: var(--blue); }
.pp { color: var(--muted); }
.pd { color: var(--pink); }
.pc { color: var(--fg); }
.c-blue { color: var(--blue); }
.c-pink { color: var(--pink); }
.c-green { color: var(--green); }
.c-mauve { color: var(--mauve); }
.c-yellow { color: var(--yellow); }
.c-peach { color: var(--peach); }
.c-muted { color: var(--muted); }
.c-over { color: var(--overlay); }
.c-red { color: var(--red); }
.bold { font-weight: 700; }
.badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  padding: .05em .45em;
  font-size: .88rem;
  margin-bottom: .35rem;
}
.link-row { display: flex; flex-wrap: wrap; gap: .2rem 0; margin-top: .2rem; }
.neo-wrap { display: flex; gap: 2.5rem; flex-wrap: wrap; margin-top:.3rem; }
.neo-art { color: var(--peach); line-height: 1.35; white-space: pre; flex-shrink:0; font-size:.85rem; }
.neo-info { display: flex; flex-direction: column; }
.neo-row { line-height: 1.6; white-space: nowrap; }
.neo-key { color: var(--blue); font-weight:700; }
.neo-val { color: var(--fg); }
.neo-sep { color: var(--overlay); }
.swatches { display:flex; gap:3px; margin-top:.6rem; }
.sw { width:20px; height:20px; border-radius:3px; }
.input-row {
  display: flex;
  align-items: center;
  margin-top: .6rem;
}
#cmd-input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: 'IBM Plex Mono', monospace;
  font-size: inherit;
  font-weight: 500;
  flex: 1;
  caret-color: var(--pink);
  margin-left: .35rem;
  width: 100%;
}
@keyframes fadein { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }
.fadein { animation: fadein .2s ease forwards; }
footer { margin-top: 1rem; color: var(--overlay); font-size: .8rem; max-width: 90ch; }
footer a { color: var(--muted); }
@media (min-width:600px) { body { font-size: 1.1rem; } }
@media (max-width:520px) { .neo-art { display:none; } }
</style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <span class="dot r"></span>
    <span class="dot y"></span>
    <span class="dot g"></span>
    <span class="win-title">rev@archlinux — kitty</span>
  </div>
  <div class="terminal-body" id="tb">
    <div id="output"></div>
    <div class="input-row" id="input-row">
      <span class="pu">rev@archlinux</span><span class="pp">:~</span><span class="pd">&nbsp;$&nbsp;</span>
      <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" autofocus>
    </div>
  </div>
</div>
<footer>
  type <span style="color:var(--pink)">help</span> for available commands &nbsp;·&nbsp;
  themed with <a href="https://github.com/catppuccin" target="_blank">catppuccin frappe</a>
</footer>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────
const DATA = {
  // ✏️ filled in some placeholders based on your info
  email: "rev@proton.me",
  github: "https://github.com/revanthlol",
  twitter: "https://x.com/revanthlol",
  youtube: "", // add if you have one
  about: [
    "linux user, backend dev, terminal addict.",
    "currently hacking on <span class='c-mauve'>fun web apps</span> &amp; learning <span class='c-peach'>Rust</span>.", // updated placeholders with examples; change to your actual stuff
    "i like fast software, minimal setups, and tools that stay out of your way.",
    // ✏️ add / edit lines
  ],
  interests: [
    "linux &amp; window managers",
    "backend development",
    "cybersecurity basics",
    "low-level systems",
    "making cringy things fun", // added for fun
    // ✏️ add more
  ],
  contact: [
    // [label, display, href] — set href to "" to skip link
    ["email", "rev@proton.me", "mailto:rev@proton.me"],
    ["github", "github.com/revanthlol", "https://github.com/revanthlol"],
    ["twitter", "@revanthlol", "https://x.com/revanthlol"],
    // ✏️ ["youtube", "YOUR_CHANNEL", "YOUR_YOUTUBE_URL"],
    // ✏️ ["discord", "YOUR#TAG", ""],
  ],
  // ── real fastfetch ──
  neo: {
    user: "rev@hp",
    os: "Arch Linux x86_64",
    host: "HP EliteBook 745 G5",
    kernel: "Linux 6.12.74-1-lts",
    packages: "1127 (pacman)",
    shell: "fish 4.5.0",
    wm: "Hyprland 0.54.0 (Wayland)",
    terminal: "kitty 0.45.0",
    termfont: "JetBrainsMonoNF-Regular (11pt)",
    cpu: "AMD Ryzen 5 PRO 2500U (8) @ 2.00 GHz",
    gpu: "AMD Radeon Vega 8 [Integrated]",
    memory: "6.70 GiB / 15.06 GiB (45%)",
    disk: "60.97 GiB / 456.39 GiB (13%) [ext4]",
    battery: "100% [AC Connected]",
    locale: "en_US.UTF-8",
  },
};
const ART =
` \`
                 .o+\`
                \`ooo/
               \`+oooo:
              \`+oooooo:
              -+oooooo+:
            \`/:-:++oooo+:
           \`/++++/+++++++:
          \`/++++++++++++++:
         \`/+++ooooooooooooo/\`
        ./ooosssso++osssssso+\`
       .oossssso-\` \`/ossssss+\`
      -osssssso. :ssssssso.
     :osssssss/ osssso+++.
    /ossssssss/ +ssssooo/-
  \`/ossssso+/:- -:/+osssso+-
 \`+sso+:-\` \`.-/+oso:
\`++:. \`-/+/
. \`/`; // kept the cat art, it's cute not cringy

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function make(html, anim=true) {
  const d = document.createElement('div');
  d.innerHTML = html;
  if (anim) d.classList.add('fadein');
  return d;
}
// ── Commands ──────────────────────────────────────────────────────────────
const CMDS = {};
function reg(names, fn) {
  (Array.isArray(names) ? names : [names]).forEach(n => CMDS[n.toLowerCase()] = fn);
}
reg('help', () => make(`
<div class="line mt"><span class="badge">commands</span></div>
<div class="line"><span class="c-blue">whoami</span> — who is rev</div>
<div class="line"><span class="c-blue">neofetch</span> — system info</div>
<div class="line"><span class="c-blue">ls links/</span> — my links</div>
<div class="line"><span class="c-blue">cat interests.md</span> — what i'm into</div>
<div class="line"><span class="c-blue">contact</span> — get in touch</div>
<div class="line"><span class="c-blue">projects</span> — my cool projects (added for fun)</div>
<div class="line"><span class="c-blue">joke</span> — tell me a joke</div>
<div class="line"><span class="c-blue">sudo</span> — try it</div>
<div class="line"><span class="c-blue">clear</span> — clear terminal</div>
<div class="line"><span class="c-blue">banner</span> — show welcome message</div>
<div class="line mt c-over">tip: use ↑↓ for history, Tab to autocomplete</div>
`));
reg('whoami', () => {
  const lines = DATA.about.map(l => `<div class="line">${l}</div>`).join('');
  return make(`<div class="mt">${lines}</div>`);
});
reg(['neofetch','fastfetch'], () => {
  const n = DATA.neo;
  const rows = [
    [null, `<span class="bold c-blue">${esc(n.user)}</span>`],
    [null, `<span class="c-over">${'─'.repeat(n.user.length)}</span>`],
    ['OS', esc(n.os)],
    ['Host', esc(n.host)],
    ['Kernel', esc(n.kernel)],
    ['Packages', esc(n.packages)],
    ['Shell', esc(n.shell)],
    ['WM', esc(n.wm)],
    ['Terminal', esc(n.terminal)],
    ['TermFont', esc(n.termfont)],
    ['CPU', esc(n.cpu)],
    ['GPU', esc(n.gpu)],
    ['Memory', esc(n.memory)],
    ['Disk', esc(n.disk)],
    ['Battery', esc(n.battery)],
    ['Locale', esc(n.locale)],
  ];
  const infoHtml = rows.map(([k,v]) => k
    ? `<div class="neo-row"><span class="neo-key">${k}</span><span class="neo-sep">: </span><span class="neo-val">${v}</span></div>`
    : `<div class="neo-row">${v}</div>`
  ).join('');
  const swColors = ['#ea999c','#a6d189','#e5c890','#8caaee','#ca9ee6','#85c1dc','#c6d0f5','#ea999c'];
  const swatches = swColors.map(c=>`<div class="sw" style="background:${c}"></div>`).join('');
  return make(`
<div class="neo-wrap mt">
  <pre class="neo-art">${ART}</pre>
  <div class="neo-info">
    ${infoHtml}
    <div class="swatches">${swatches}</div>
  </div>
</div>`);
});
reg(['ls links/', 'ls links', 'links'], () => {
  const defs = [
    ['github', 'GitHub', DATA.github],
    ['twitter', 'X (Twitter)', DATA.twitter],
    ['youtube', 'YouTube', DATA.youtube],
  ].filter(([_,__,url]) => url && !url.startsWith('YOUR_')); // filter out empty
  const items = defs.map(([cls,label,url]) => {
    return `<a class="${cls}" href="${url}" target="_blank">${label}</a>`;
  }).join('<span class="c-over"> </span>');
  return make(`<div class="line mt link-row">${items}</div>`);
});
reg(['cat interests.md','cat interests','interests'], () => {
  const items = DATA.interests.map(i =>
    `<div class="line"><span class="c-blue">•</span> ${i}</div>`
  ).join('');
  return make(`<div class="mt"><div class="line"><span class="badge">interests</span></div>${items}</div>`);
});
reg('contact', () => {
  const items = DATA.contact.filter(([_,__,url]) => url && !url.startsWith('YOUR_')).map(([k,v,url]) => {
    const val = url ? `<a href="${url}" target="_blank">${esc(v)}</a>` : `<span class="c-over">${esc(v)}</span>`;
    return `<div class="line"><span class="c-mauve">→</span> <span class="c-blue">${esc(k)}</span><span class="c-over">: </span>${val}</div>`;
  }).join('');
  return make(`<div class="mt"><div class="line"><span class="badge">contact</span></div>${items}</div>`);
});
reg('projects', () => make(`  // new command for fun
<div class="line mt"><span class="badge">projects</span></div>
<div class="line"><span class="c-green">• Portfolio Terminal</span> - This very site! Meta, right?</div>
<div class="line"><span class="c-green">• Backend API</span> - Some cool API I built in Node.js (add your real ones)</div>
<div class="line"><span class="c-green">• Linux Script</span> - Automation tools for Arch</div>
<div class="line c-over">Add more by editing the code!</div>
`));
reg('joke', () => make(`
<div class="line mt">Why do programmers prefer dark mode?</div>
<div class="line">Because light attracts bugs! 🐛</div>
`));
reg('sudo', () => make(`
<div class="line mt c-red">[sudo] password for rev: </div>
<div class="line c-over">Just kidding, no superpowers here. Try a real command!</div>
`));
reg('banner', () => showBanner());
reg('clear', () => {
  document.getElementById('output').innerHTML = '';
  return null;
});
function unknown(cmd) {
  const funResponses = [
    `<span class="c-red">fish: Unknown command:</span> <span class="c-over">${esc(cmd)}</span> — try <span class="c-pink">help</span>`,
    `Whoops, '${esc(cmd)}' isn't a thing. Maybe try 'coffee' next time?`,
    `Error 404: Command not found. Did you mean 'please'?`,
  ];
  const random = funResponses[Math.floor(Math.random() * funResponses.length)];
  return make(`<div class="line mt">${random}</div>`);
}
// ── Banner ────────────────────────────────────────────────────────────────
function showBanner() {
  return make(`
<div class="line"><span class="c-blue bold">rev@archlinux</span> <span class="c-over">~</span></div>
<div class="line c-over">type <span class="c-pink">help</span> for available commands. Now with more fun!</div>
  `, false);
}
// ── History + autocomplete ────────────────────────────────────────────────
const history = [];
let histIdx = -1;
const ALL_CMDS = () => Object.keys(CMDS).filter(k=>!['clear'].includes(k));
// ── Run ───────────────────────────────────────────────────────────────────
function run(raw) {
  const cmd = raw.trim().toLowerCase(); // made case-insensitive
  const out = document.getElementById('output');
  const echo = document.createElement('div');
  echo.className = 'line mt';
  echo.innerHTML = `<span class="pu">rev@archlinux</span><span class="pp">:~</span><span class="pd">&nbsp;$&nbsp;</span><span class="pc">${esc(raw)}</span>`;
  out.appendChild(echo);
  if (!raw) { scroll(); return; }
  if (history[0] !== raw) history.unshift(raw);
  histIdx = -1;
  const handler = CMDS[cmd];
  const result = handler ? handler() : unknown(raw);
  if (result) out.appendChild(result);
  scroll();
}
function scroll() {
  const tb = document.getElementById('tb');
  tb.scrollTop = tb.scrollHeight;
}
// ── Input ─────────────────────────────────────────────────────────────────
const input = document.getElementById('cmd-input');
document.getElementById('tb').addEventListener('click', () => input.focus());
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    run(input.value);
    input.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.toLowerCase();
    if (!val) return;
    const matches = ALL_CMDS().filter(k => k.startsWith(val));
    if (matches.length === 1) input.value = matches[0];
    // if multiple, could list, but keeping simple
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    document.getElementById('output').innerHTML = '';
  }
});
// ── Boot ──────────────────────────────────────────────────────────────────
document.getElementById('output').appendChild(showBanner());
input.focus();
</script>
</body>
</html>
